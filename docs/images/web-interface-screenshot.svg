<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="750" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#grad1)"/>

  <!-- Container with shadow -->
  <rect x="80" y="60" width="1040" height="630" rx="12" fill="white" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="80" y="60" width="1040" height="80" rx="12" fill="#667eea"/>
  <text x="115" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="28" fill="white" font-weight="bold">🏃 Running Coach Service</text>
  <rect x="980" y="82" width="110" height="36" rx="18" fill="rgba(255,255,255,0.25)"/>
  <text x="1005" y="107" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="13" fill="white" font-weight="600" letter-spacing="0.5">CLAUDE</text>

  <text x="115" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">AI Provider: </text>

  <!-- Agent selector bar -->
  <rect x="80" y="140" width="1040" height="65" fill="#f5f5f5"/>
  <rect x="115" y="160" width="970" height="40" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="135" y="186" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#666">Auto-detect agent from query</text>
  <text x="1055" y="186" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#999">▼</text>

  <!-- Messages area background -->
  <rect x="80" y="205" width="1040" height="415" fill="#fafafa"/>

  <!-- Welcome message (assistant) -->
  <rect x="115" y="230" width="680" height="75" rx="20" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="140" y="257" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#333">👋 Welcome! I'm your running coach. Ask me about training,</text>
  <text x="140" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#333">workouts, nutrition, strength, or mobility.</text>

  <!-- User message -->
  <g>
    <rect x="720" y="330" width="360" height="55" rx="20" fill="#667eea"/>
    <text x="745" y="363" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="white">What should I run today?</text>
  </g>

  <!-- Assistant response -->
  <g>
    <rect x="115" y="410" width="750" height="165" rx="20" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <text x="140" y="437" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#333">Based on your current training phase and recent health data, I</text>
    <text x="140" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#333">recommend a <tspan font-weight="600">45-minute easy run</tspan> at your E pace (10:00-</text>
    <text x="140" y="483" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#333">11:10/mile). Your resting heart rate has been stable and sleep</text>
    <text x="140" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#333">quality is good, so you're well-recovered for this easy effort.</text>

    <text x="140" y="545" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="12" fill="#999" font-weight="600" letter-spacing="0.5">RUNNING-COACH</text>
  </g>

  <!-- Input area -->
  <rect x="80" y="620" width="1040" height="70" fill="white"/>
  <line x1="80" y1="620" x2="1120" y2="620" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="115" y="638" width="810" height="44" rx="22" fill="#f5f5f5"/>
  <text x="145" y="665" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="#999">Ask me anything about your training...</text>

  <rect x="950" y="638" width="135" height="44" rx="22" fill="#667eea"/>
  <text x="1000" y="665" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" fill="white" font-weight="600" text-anchor="middle">Send</text>
</svg>
